<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users &mdash; Endurance Science Labs</title>
<meta name="description" content="Admin tool: assign coaches, adjust roles, and manage feature access for Endurance Science Labs users.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/site.css">
<style>
  body { font-family: var(--ui); background: var(--bg); color: var(--text); min-height: 100vh; margin: 0; padding-bottom: 60px; }

  .mu-wrap { max-width: 1180px; margin: 0 auto; padding: 32px 24px; }
  .mu-eyebrow { display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--purple);font-family:var(--mono);background:rgba(139,124,248,.10);border:1px solid rgba(139,124,248,.28);border-radius:20px;padding:4px 12px;margin-bottom:12px }
  .mu-title { font-size:28px;font-weight:800;letter-spacing:-.5px;margin:0 0 8px;color:var(--text) }
  .mu-sub { font-size:14px;color:var(--muted2);line-height:1.6;margin:0 0 24px;max-width:680px }

  /* ── Stat strip ─────────────────────────────────────── */
  .mu-stats { display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px }
  .mu-stat { flex:1;min-width:130px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 18px }
  .mu-stat-num { font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1 }
  .mu-stat-label { font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted2);font-family:var(--mono);margin-top:6px }
  .mu-stat.coaches .mu-stat-num { color:var(--purple) }
  .mu-stat.athletes .mu-stat-num { color:var(--cyan) }
  .mu-stat.unassigned .mu-stat-num { color:var(--warn) }

  /* ── Toolbar ────────────────────────────────────────── */
  .mu-toolbar { display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px }
  .mu-search { flex:1;min-width:200px;position:relative }
  .mu-search input { width:100%;box-sizing:border-box;padding:9px 12px 9px 32px;background:var(--panel2);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:var(--ui);font-size:13px;outline:none;transition:border-color .15s }
  .mu-search input:focus { border-color:var(--cyan) }
  .mu-search .mu-search-icon { position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:13px;pointer-events:none }
  .mu-filter { display:flex;align-items:center;gap:6px }
  .mu-filter label { font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);font-family:var(--mono) }
  .mu-filter select { padding:8px 10px;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--ui);font-size:13px;cursor:pointer;outline:none;transition:border-color .15s }
  .mu-filter select:focus { border-color:var(--cyan) }
  .mu-clear { padding:8px 12px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--muted2);font-family:var(--ui);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s }
  .mu-clear:hover { border-color:var(--bad);color:var(--bad) }

  /* ── Table ──────────────────────────────────────────── */
  .mu-table-wrap { background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden }
  .mu-table-scroll { overflow-x:auto }
  table.mu-table { width:100%;border-collapse:collapse;min-width:860px }
  .mu-table thead th { position:sticky;top:0;background:var(--panel2);text-align:left;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted2);font-family:var(--mono);padding:12px 16px;border-bottom:1px solid var(--border2);white-space:nowrap }
  .mu-table thead th.sortable { cursor:pointer;user-select:none }
  .mu-table thead th.sortable:hover { color:var(--text) }
  .mu-table thead th .sort-arrow { color:var(--cyan);margin-left:4px }
  .mu-table tbody td { padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle }
  .mu-table tbody tr:last-child td { border-bottom:none }
  .mu-table tbody tr:hover { background:rgba(255,255,255,.015) }

  /* User cell */
  .mu-user { display:flex;align-items:center;gap:11px;min-width:0 }
  .mu-avatar { flex-shrink:0;width:34px;height:34px;border-radius:9px;background:var(--panel2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted2);font-family:var(--mono) }
  .mu-user-name { font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis }
  .mu-user-email { font-size:11px;color:var(--muted2);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis }
  .mu-you-tag { font-size:8.5px;font-weight:700;letter-spacing:.4px;color:var(--cyan);background:rgba(0,229,200,.12);border:1px solid rgba(0,229,200,.3);border-radius:4px;padding:1px 5px;margin-left:6px;font-family:var(--mono);vertical-align:1px }

  /* Role pill */
  .mu-role-pill { display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:.5px;cursor:pointer;transition:all .15s;user-select:none;text-transform:uppercase;white-space:nowrap }
  .mu-role-pill.coach { background:rgba(139,124,248,.16);border:1px solid rgba(139,124,248,.34);color:var(--purple) }
  .mu-role-pill.athlete { background:rgba(0,229,200,.12);border:1px solid rgba(0,229,200,.3);color:var(--cyan) }
  .mu-role-pill:hover { filter:brightness(1.18) }
  .mu-role-pill[disabled] { opacity:.5;cursor:wait }
  .mu-role-pill .swap { opacity:.6;font-size:9px }

  /* Coach assignment */
  .mu-coach-select { max-width:190px;padding:7px 9px;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--ui);font-size:12px;cursor:pointer;outline:none;transition:border-color .15s }
  .mu-coach-select:focus { border-color:var(--cyan) }
  .mu-coach-select.unassigned { border-color:rgba(245,166,35,.4);color:var(--warn) }
  .mu-coach-na { font-size:11px;color:var(--muted);font-family:var(--mono);font-style:italic }

  /* Feature toggles */
  .mu-feats { display:flex;gap:6px;flex-wrap:wrap }
  .mu-feat { display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:7px;border:1px solid var(--border2);font-size:10px;font-weight:600;font-family:var(--mono);cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap }
  .mu-feat.on { background:rgba(0,229,200,.12);border-color:rgba(0,229,200,.3);color:var(--cyan) }
  .mu-feat.off { background:transparent;color:var(--muted2) }
  .mu-feat:hover { border-color:var(--cyan) }
  .mu-feat[disabled] { opacity:.5;cursor:wait }
  .mu-feat-dot { width:7px;height:7px;border-radius:50%;transition:background .15s }
  .mu-feat.on .mu-feat-dot { background:var(--cyan) }
  .mu-feat.off .mu-feat-dot { background:var(--muted) }

  .mu-joined { font-size:11px;color:var(--muted2);font-family:var(--mono);white-space:nowrap }

  .mu-empty { padding:50px 20px;text-align:center;color:var(--muted2);font-size:13px;font-family:var(--mono) }
  .mu-loading { padding:60px 20px;text-align:center;color:var(--muted2);font-size:13px;font-family:var(--mono) }

  /* Toast */
  .mu-toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel2);border:1px solid var(--border2);border-radius:10px;padding:11px 18px;font-size:12.5px;font-family:var(--ui);color:var(--text);box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:500 }
  .mu-toast.show { opacity:1;transform:translateX(-50%) translateY(0) }
  .mu-toast.error { border-color:rgba(245,80,80,.5);color:var(--bad) }
  .mu-toast.success { border-color:rgba(34,199,138,.5) }

  #mu-app { display:none }
  #mu-app.show { display:block }

  @media (max-width:640px) {
    .mu-wrap { padding:22px 14px }
    .mu-title { font-size:23px }
  }
</style>
</head>
<body>

<!-- Sign-in gate (admin-only — mounted by /shared/site.js) -->
<div id="mu-gate"></div>

<!-- App (shown only to the signed-in admin) -->
<div id="mu-app">
  <nav class="eslabs-nav" id="mu-nav"></nav>

  <div class="mu-wrap">
    <div class="mu-eyebrow">&#9673; Admin</div>
    <h1 class="mu-title">Manage Users</h1>
    <p class="mu-sub">Search and filter every Endurance Science Labs account. Assign athletes to coaches, switch roles, and toggle which features each user can access. Changes save instantly.</p>

    <div class="mu-stats" id="mu-stats"></div>

    <div class="mu-toolbar">
      <div class="mu-search">
        <span class="mu-search-icon">&#9906;</span>
        <input type="text" id="mu-search-input" placeholder="Search by name or email…" autocomplete="off">
      </div>
      <div class="mu-filter">
        <label for="mu-role-filter">Role</label>
        <select id="mu-role-filter">
          <option value="all">All</option>
          <option value="coach">Coaches</option>
          <option value="athlete">Athletes</option>
        </select>
      </div>
      <div class="mu-filter">
        <label for="mu-coach-filter">Coach</label>
        <select id="mu-coach-filter">
          <option value="all">All</option>
          <option value="unassigned">Unassigned</option>
        </select>
      </div>
      <button class="mu-clear" id="mu-clear-btn">Clear</button>
    </div>

    <div class="mu-table-wrap">
      <div class="mu-table-scroll">
        <table class="mu-table">
          <thead>
            <tr id="mu-head-row"></tr>
          </thead>
          <tbody id="mu-body">
            <tr><td colspan="5"><div class="mu-loading">Loading users…</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="mu-toast" id="mu-toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="/shared/site.js"></script>
<script src="./app.js"></script>

</body>
</html>
