<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>try{if(localStorage.getItem('esl-theme')==='light')document.documentElement.setAttribute('data-theme','light')}catch(e){}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Dynamics — Endurance Science Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/site.css">
<style>
:root{
  --bg:#06080d;--panel:#0d1020;--panel2:#131828;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --hover:rgba(255,255,255,0.03);
  --cyan:#00e5c8;--gold:#f5c842;--coral:#ff6b35;--purple:#8b7cf8;
  --text:#dde1ef;--muted:#3e4460;--muted2:#6e7a9a;
  --good:#22c78a;--warn:#f5a623;--bad:#f55050;
  --ui:'Inter',system-ui,sans-serif;--mono:'Space Mono',monospace;--body:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box}
body{font-family:var(--ui);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5}
a{color:var(--cyan)}
.wrap{max-width:1180px;margin:0 auto;padding:30px 26px 80px}
.eyebrow{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--cyan);font-family:var(--mono);background:rgba(0,229,200,.08);border:1px solid rgba(0,229,200,.2);border-radius:20px;padding:4px 12px;margin-bottom:14px}
</style>
</head>
<body>

<div id="nav-mount"></div>
<div id="gate-mount"></div>

<div class="wrap" id="tool" style="display:none">
  <span class="eyebrow">Running Dynamics</span>
  <div id="rdx-mount"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="/shared/site.js"></script>
<script src="/shared/run-load-model.js?v=7"></script>
<script src="/shared/device-matrix.js"></script>
<script src="/shared/run-dynamics.js?v=5"></script>
<script>
'use strict';
/* The whole Run Dynamics view lives in /shared/run-dynamics.js — this page
   just signs the user in and mounts it for their own account. The coaching
   dashboard mounts the exact same module for a viewed athlete. */
esLabs.mountNav('#nav-mount', { active:'' });
esLabs.mountAuthGate('#gate-mount', {
  eyebrow:'◉ Coach tool',
  headline:'Run Dynamics',
  sub:'Sign in to import your Garmin run history and track ground contact time, vertical oscillation, cadence and efficiency over time.',
  bullets:[
    {strong:'Bulk backfill', span:'— import your full Garmin export once; we de-dupe by activity so re-imports only add what is new'},
    {strong:'Form metrics over time', span:'— GCT, vertical oscillation, cadence, stride and derived load/efficiency by window or custom range'},
    {strong:'Private to your account', span:'— stored under your profile only'}
  ],
  emailDefault:'signup'
});

esLabs.onAuthChange(function(user){
  var tool=document.getElementById('tool');
  if(user){
    tool.style.display='block';
    RunDynamics.mount(document.getElementById('rdx-mount'), {
      db: esLabs.db, uid: user.uid, role: 'athlete',
      admin: (user.uid === esLabs.ADMIN_UID),
      title: 'Garmin Run Dynamics',
      sub: 'Import a Garmin Connect activities export (<code>Activities.csv</code>) to backfill your run history. New activities are saved to your account and de-duplicated by start time, so you only ever import what\'s new.'
    });
  } else {
    tool.style.display='none';
  }
});
</script>
</body>
</html>
