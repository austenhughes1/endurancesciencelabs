<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My account &mdash; Endurance Science Labs</title>
<meta name="description" content="Manage your Endurance Science Labs profile, unlocked features, and billing.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/site.css">
<style>
  body { font-family: var(--ui); background: var(--bg); color: var(--text); min-height: 100vh; margin: 0; padding-bottom: 60px; }

  .acct-wrap { max-width: 880px; margin: 0 auto; padding: 36px 24px; }
  .acct-eyebrow { display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--cyan);font-family:var(--mono);background:rgba(0,229,200,.08);border:1px solid rgba(0,229,200,.2);border-radius:20px;padding:4px 12px;margin-bottom:12px }
  .acct-title { font-size:30px;font-weight:800;letter-spacing:-.5px;margin:0 0 10px;color:var(--text);font-family:var(--ui) }
  .acct-sub { font-size:14px;color:var(--muted2);line-height:1.65;margin:0 0 28px;max-width:580px }

  .acct-card { background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px 26px;margin-bottom:18px }
  .acct-card h2 { font-family:var(--ui);font-size:16px;font-weight:700;letter-spacing:.2px;margin:0 0 4px;color:var(--text);display:flex;align-items:center;gap:10px }
  .acct-card .card-sub { font-size:13px;color:var(--muted2);line-height:1.6;margin:0 0 20px }

  .field-grid { display:grid;grid-template-columns:1fr 1fr;gap:16px 18px }
  @media(max-width:640px){ .field-grid{ grid-template-columns:1fr } }

  .field { display:flex;flex-direction:column;gap:6px }
  .field-label { font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted2);font-family:var(--mono) }
  .field-input,
  .field-static { padding:10px 12px;background:var(--panel2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--ui);font-size:14px;font-weight:500;width:100%;box-sizing:border-box }
  .field-input:focus { outline:none;border-color:var(--cyan);background:rgba(0,229,200,.04) }
  .field-static { color:var(--muted2);user-select:text }
  .field-static .lock-pill { display:inline-block;margin-left:8px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);background:rgba(110,122,154,.15);border-radius:4px;padding:2px 6px;font-family:var(--mono);vertical-align:1px }

  .radio-row { display:flex;gap:8px;flex-wrap:wrap }
  .radio-pill { flex:1;min-width:120px;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;background:var(--panel2);border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted2);transition:all .15s;user-select:none }
  .radio-pill:hover { border-color:var(--border2);color:var(--text) }
  .radio-pill input { position:absolute;opacity:0;pointer-events:none }
  .radio-pill.checked { border-color:var(--cyan);background:rgba(0,229,200,.07);color:var(--cyan) }

  .save-row { display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:22px;flex-wrap:wrap }
  .save-status { font-size:12px;color:var(--muted2);font-family:var(--mono) }
  .save-status.success { color:var(--good) }
  .save-status.error { color:var(--bad) }
  .btn-primary { display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:var(--cyan);color:#0a0a0a;font-weight:700;font-size:13px;font-family:var(--ui);border:none;border-radius:9px;cursor:pointer;transition:opacity .15s }
  .btn-primary:hover { opacity:.85 }
  .btn-primary:disabled { opacity:.4;cursor:not-allowed }

  .feature-row { display:flex;align-items:flex-start;gap:16px;padding:18px 0;border-top:1px solid var(--border) }
  .feature-row:first-of-type { border-top:none;padding-top:0 }
  .feature-icon { flex-shrink:0;width:42px;height:42px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px }
  .feature-body { flex:1;min-width:0 }
  .feature-name { font-size:14px;font-weight:700;color:var(--text);margin:0 0 4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap }
  .feature-desc { font-size:13px;color:var(--muted2);line-height:1.55;margin:0 0 10px }

  .badge { display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono);border-radius:5px;padding:3px 7px;line-height:1 }
  .badge.unlocked { background:rgba(34,199,138,.18);color:var(--good);border:1px solid rgba(34,199,138,.3) }
  .badge.locked { background:rgba(110,122,154,.15);color:var(--muted2);border:1px solid var(--border2) }
  .badge.source { background:rgba(139,124,248,.18);color:var(--purple);border:1px solid rgba(139,124,248,.3) }

  .feature-actions { display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px }
  .feature-actions .btn-link { display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-size:12px;font-weight:600;font-family:var(--ui);border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;text-decoration:none;transition:all .15s }
  .feature-actions .btn-link:hover { border-color:var(--cyan);color:var(--cyan) }
  .feature-actions .btn-link.cyan { border-color:rgba(0,229,200,.3);background:rgba(0,229,200,.07);color:var(--cyan) }
  .feature-actions .btn-link.cyan:hover { background:rgba(0,229,200,.13) }

  .billing-foot { display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:20px;padding-top:18px;border-top:1px solid var(--border);flex-wrap:wrap }
  .billing-foot-text { font-size:12px;color:var(--muted2);line-height:1.55;max-width:480px }
  .billing-foot-text strong { color:var(--text);font-weight:600 }

  .danger-zone { margin-top:30px;padding-top:24px;border-top:1px dashed var(--border);display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap }
  .danger-zone-text { font-size:12px;color:var(--muted2) }
  .btn-signout { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:12px;font-weight:600;font-family:var(--ui);border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s }
  .btn-signout:hover { border-color:var(--bad);color:var(--bad) }

  .acct-loading { padding:60px 20px;text-align:center;color:var(--muted2);font-size:13px;font-family:var(--mono) }
  #acct-app { display: none; }
  #acct-app.show { display: block; }

  /* Coaching-client banner */
  .coach-banner {
    display:flex;gap:14px;align-items:flex-start;
    background:linear-gradient(135deg, rgba(245,166,35,.10), rgba(245,166,35,.04));
    border:1px solid rgba(245,166,35,.32);
    border-left:4px solid var(--warn);
    border-radius:12px;
    padding:14px 18px;margin-bottom:18px;
  }
  .coach-banner-icon { color:var(--warn); font-size:18px; line-height:1.2; flex-shrink:0 }
  .coach-banner-body { flex:1; min-width:0 }
  .coach-banner-title { font-size:13px; font-weight:700; color:var(--warn); margin:0 0 4px }
  .coach-banner-text { font-size:13px; color:var(--text); line-height:1.55 }

  /* Required-field marker */
  .req-star { color: var(--bad); font-weight:700; margin-left:3px; display:none }
  .field-label-hint { color: var(--muted); font-weight:500; font-size:10px; margin-left:4px }

  /* Textarea variant of field-input */
  .field-textarea { font-family: var(--ui); line-height:1.55; resize:vertical; min-height: 70px }

  /* PRs list */
  .prs-list { display:flex; flex-direction:column; gap:8px; margin-bottom:14px }
  .prs-list:empty { padding:8px 0; color: var(--muted2); font-size:13px; font-family: var(--mono) }
  .prs-list:empty::before { content: 'No PRs yet — click "+ Add PR" below to add one.'; display:block; padding:8px 0 }
  .pr-row {
    display:grid;
    grid-template-columns: minmax(120px,1fr) minmax(140px,1fr) minmax(130px,150px) 36px;
    gap:8px; align-items:center;
  }
  @media (max-width:560px) {
    .pr-row { grid-template-columns: 1fr 1fr; grid-template-areas: "time distance" "date date" "rm rm"; }
    .pr-row .pr-time { grid-area: time }
    .pr-row .pr-distance { grid-area: distance }
    .pr-row .pr-date { grid-area: date }
    .pr-row .pr-remove { grid-area: rm; justify-self: end; width:36px }
  }
  .pr-row .field-input { padding: 9px 11px; font-size:13px; margin:0 }
  .pr-distance { color: var(--text); cursor:pointer }
  .pr-remove {
    background: transparent; border:1px solid var(--border2);
    color: var(--muted2); border-radius:7px;
    width:36px; height:36px; cursor:pointer; font-size:18px; line-height:1;
    transition: all .15s;
  }
  .pr-remove:hover { border-color: var(--bad); color: var(--bad) }

  .btn-add-pr {
    display:inline-flex; align-items:center; gap:6px;
    padding:8px 16px; font-size:12px; font-weight:600; font-family: var(--ui);
    border-radius:8px; border:1px dashed var(--border2);
    background:transparent; color: var(--muted2); cursor:pointer;
    transition: all .15s;
  }
  .btn-add-pr:hover { border-color: var(--cyan); color: var(--cyan) }
  .btn-add-pr:disabled { opacity:.45; cursor:not-allowed }
  .btn-add-pr:disabled:hover { border-color: var(--border2); color: var(--muted2) }

  /* ── "My ESLabs metabolic profile" card ─────────────────────── */
  .vo2-card {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 26px 28px;
  }
  .vo2-card-lactate {
    background: linear-gradient(135deg, rgba(139,124,248,.10), rgba(139,124,248,.02));
    border-color: rgba(139,124,248,.34);
  }
  .vo2-card-power {
    background: linear-gradient(135deg, rgba(0,229,200,.08), rgba(139,124,248,.04));
    border-color: rgba(0,229,200,.30);
  }
  .vo2-card-empty {
    background: linear-gradient(135deg, rgba(0,229,200,.06), rgba(139,124,248,.02));
    border-color: rgba(0,229,200,.24);
    border-style: dashed;
  }
  .vo2-card::before {
    /* soft glow in the top-right corner — color varies by state */
    content: '';
    position: absolute;
    top: -90px; right: -90px;
    width: 280px; height: 280px;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(10px);
  }
  .vo2-card-lactate::before { background: radial-gradient(circle, rgba(139,124,248,.20), transparent 60%); }
  .vo2-card-power::before   { background: radial-gradient(circle, rgba(0,229,200,.16), transparent 60%); }
  .vo2-card-empty::before   { background: radial-gradient(circle, rgba(0,229,200,.10), transparent 60%); }
  .vo2-card > * { position: relative; }

  .vo2-card-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 8px; flex-wrap: wrap;
  }
  .vo2-card-head h2 {
    margin: 0; font-size: 16px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }
  .vo2-card-glyph { color: var(--purple); font-size: 18px; line-height: 1; }
  .vo2-card-power .vo2-card-glyph { color: var(--cyan); }
  .vo2-card-tag {
    display: inline-block;
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: .6px; text-transform: uppercase;
    border-radius: 6px; padding: 3px 8px; line-height: 1.3;
  }
  .tag-lactate { background: rgba(139,124,248,.18); color: var(--purple); border: 1px solid rgba(139,124,248,.36); }
  .tag-estimate { background: rgba(245,166,35,.16); color: var(--warn); border: 1px solid rgba(245,166,35,.36); }

  .vo2-card-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin: 18px 0 10px;
  }
  .vo2-stat {
    background: rgba(8,9,15,.55);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .vo2-stat-label {
    font-family: var(--mono); font-size: 10.5px; font-weight: 700;
    letter-spacing: .8px; text-transform: uppercase;
    color: var(--muted2); margin-bottom: 6px;
  }
  .vo2-stat-value {
    font-size: 22px; font-weight: 700; letter-spacing: -.5px;
    color: var(--text); line-height: 1.1;
  }
  .vo2-stat-unit {
    font-size: 12px; font-weight: 500; color: var(--muted2);
    letter-spacing: 0; margin-left: 2px;
  }
  .vo2-stat-note {
    margin-top: 6px;
    font-size: 11.5px; color: var(--muted2); line-height: 1.4;
  }

  .vo2-meta {
    display: flex; flex-wrap: wrap; gap: 8px;
    font-family: var(--mono); font-size: 11px;
    color: var(--muted2); letter-spacing: .3px;
    margin: 8px 0 14px;
  }
  .vo2-meta strong { color: var(--text); font-weight: 600; }

  .vo2-card-msg {
    font-size: 13px; line-height: 1.6;
    color: var(--text); margin: 0 0 18px;
    max-width: 620px;
  }
  .vo2-card-msg a { color: var(--cyan); text-decoration: none; }
  .vo2-card-msg a:hover { text-decoration: underline; }

  .vo2-card-cta {
    display: flex; flex-wrap: wrap; gap: 12px;
    align-items: center;
  }
  .vo2-card-cta .btn-primary {
    background: var(--cyan); color: #0a0a0a;
    padding: 11px 22px; font-size: 13px;
    border: none; border-radius: 9px;
    font-weight: 700; cursor: pointer; transition: opacity .15s;
    text-decoration: none;
  }
  .vo2-card-lactate .vo2-card-cta .btn-primary {
    background: var(--purple); color: #0c0a18;
  }
  .vo2-card-cta .btn-primary:hover { opacity: .85; text-decoration: none; }
  .vo2-card-cta .vo2-alt {
    font-size: 12.5px; font-weight: 600; color: var(--muted2);
    text-decoration: none; padding: 6px 4px;
  }
  .vo2-card-cta .vo2-alt:hover { color: var(--text); }

  /* Unified save bar (sticky-ish at the bottom of the form cards) */
  .save-bar {
    display:flex; justify-content:flex-end; align-items:center;
    gap:14px; flex-wrap:wrap;
    background: var(--panel); border:1px solid var(--border);
    border-radius:14px; padding:16px 22px; margin-bottom:18px;
  }
</style>
</head>
<body>

<!-- Sign-in gate (mounted by shared/site.js when signed out) -->
<div id="acct-gate"></div>

<!-- App (shown when signed in) -->
<div id="acct-app">
  <nav class="eslabs-nav" id="acct-nav"></nav>

  <div class="acct-wrap">
    <div class="acct-eyebrow">&#9673; My account</div>
    <h1 class="acct-title">Your profile &amp; access</h1>
    <p class="acct-sub">Update what we know about you, see which Endurance Science Labs features you can use right now, and manage your billing.</p>

    <div id="acct-content">
      <div class="acct-loading">Loading your account&hellip;</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
<script src="/shared/site.js"></script>
<script src="./app.js"></script>

</body>
</html>
