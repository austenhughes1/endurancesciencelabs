<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My account &mdash; Endurance Science Labs</title>
<meta name="description" content="Manage your Endurance Science Labs profile, unlocked features, and billing.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/site.css">
<style>
  body { font-family: var(--ui); background: var(--bg); color: var(--text); min-height: 100vh; margin: 0; padding-bottom: 60px; }

  .acct-wrap { max-width: 880px; margin: 0 auto; padding: 36px 24px; }
  .acct-eyebrow { display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--cyan);font-family:var(--mono);background:rgba(0,229,200,.08);border:1px solid rgba(0,229,200,.2);border-radius:20px;padding:4px 12px;margin-bottom:12px }
  .acct-title { font-size:30px;font-weight:800;letter-spacing:-.5px;margin:0 0 10px;color:var(--text);font-family:var(--ui) }
  .acct-sub { font-size:14px;color:var(--muted2);line-height:1.65;margin:0 0 28px;max-width:580px }

  .acct-card { background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px 26px;margin-bottom:18px }
  .acct-card h2 { font-family:var(--ui);font-size:16px;font-weight:700;letter-spacing:.2px;margin:0 0 4px;color:var(--text);display:flex;align-items:center;gap:10px }
  .acct-card .card-sub { font-size:13px;color:var(--muted2);line-height:1.6;margin:0 0 20px }

  .field-grid { display:grid;grid-template-columns:1fr 1fr;gap:16px 18px }
  @media(max-width:640px){ .field-grid{ grid-template-columns:1fr } }

  .field { display:flex;flex-direction:column;gap:6px }
  .field-label { font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted2);font-family:var(--mono) }
  .field-input,
  .field-static { padding:10px 12px;background:var(--panel2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--ui);font-size:14px;font-weight:500;width:100%;box-sizing:border-box }
  .field-input:focus { outline:none;border-color:var(--cyan);background:rgba(0,229,200,.04) }
  .field-static { color:var(--muted2);user-select:text }
  .field-static .lock-pill { display:inline-block;margin-left:8px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);background:rgba(110,122,154,.15);border-radius:4px;padding:2px 6px;font-family:var(--mono);vertical-align:1px }

  .radio-row { display:flex;gap:8px;flex-wrap:wrap }
  .radio-pill { flex:1;min-width:120px;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;background:var(--panel2);border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted2);transition:all .15s;user-select:none }
  .radio-pill:hover { border-color:var(--border2);color:var(--text) }
  .radio-pill input { position:absolute;opacity:0;pointer-events:none }
  .radio-pill.checked { border-color:var(--cyan);background:rgba(0,229,200,.07);color:var(--cyan) }

  .save-row { display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:22px;flex-wrap:wrap }
  .save-status { font-size:12px;color:var(--muted2);font-family:var(--mono) }
  .save-status.success { color:var(--good) }
  .save-status.error { color:var(--bad) }
  .btn-primary { display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:var(--cyan);color:#0a0a0a;font-weight:700;font-size:13px;font-family:var(--ui);border:none;border-radius:9px;cursor:pointer;transition:opacity .15s }
  .btn-primary:hover { opacity:.85 }
  .btn-primary:disabled { opacity:.4;cursor:not-allowed }

  .feature-row { display:flex;align-items:flex-start;gap:16px;padding:18px 0;border-top:1px solid var(--border) }
  .feature-row:first-of-type { border-top:none;padding-top:0 }
  .feature-icon { flex-shrink:0;width:42px;height:42px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px }
  .feature-body { flex:1;min-width:0 }
  .feature-name { font-size:14px;font-weight:700;color:var(--text);margin:0 0 4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap }
  .feature-desc { font-size:13px;color:var(--muted2);line-height:1.55;margin:0 0 10px }

  .badge { display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono);border-radius:5px;padding:3px 7px;line-height:1 }
  .badge.unlocked { background:rgba(34,199,138,.18);color:var(--good);border:1px solid rgba(34,199,138,.3) }
  .badge.locked { background:rgba(110,122,154,.15);color:var(--muted2);border:1px solid var(--border2) }
  .badge.source { background:rgba(139,124,248,.18);color:var(--purple);border:1px solid rgba(139,124,248,.3) }

  .feature-actions { display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px }
  .feature-actions .btn-link { display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-size:12px;font-weight:600;font-family:var(--ui);border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;text-decoration:none;transition:all .15s }
  .feature-actions .btn-link:hover { border-color:var(--cyan);color:var(--cyan) }
  .feature-actions .btn-link.cyan { border-color:rgba(0,229,200,.3);background:rgba(0,229,200,.07);color:var(--cyan) }
  .feature-actions .btn-link.cyan:hover { background:rgba(0,229,200,.13) }

  .billing-foot { display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:20px;padding-top:18px;border-top:1px solid var(--border);flex-wrap:wrap }
  .billing-foot-text { font-size:12px;color:var(--muted2);line-height:1.55;max-width:480px }
  .billing-foot-text strong { color:var(--text);font-weight:600 }

  .danger-zone { margin-top:30px;padding-top:24px;border-top:1px dashed var(--border);display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap }
  .danger-zone-text { font-size:12px;color:var(--muted2) }
  .btn-signout { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:12px;font-weight:600;font-family:var(--ui);border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s }
  .btn-signout:hover { border-color:var(--bad);color:var(--bad) }

  .acct-loading { padding:60px 20px;text-align:center;color:var(--muted2);font-size:13px;font-family:var(--mono) }
  #acct-app { display: none; }
  #acct-app.show { display: block; }
</style>
</head>
<body>

<!-- Sign-in gate (mounted by shared/site.js when signed out) -->
<div id="acct-gate"></div>

<!-- App (shown when signed in) -->
<div id="acct-app">
  <nav class="eslabs-nav" id="acct-nav"></nav>

  <div class="acct-wrap">
    <div class="acct-eyebrow">&#9673; My account</div>
    <h1 class="acct-title">Your profile &amp; access</h1>
    <p class="acct-sub">Update what we know about you, see which Endurance Science Labs features you can use right now, and manage your billing.</p>

    <div id="acct-content">
      <div class="acct-loading">Loading your account&hellip;</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
<script src="/shared/site.js"></script>
<script src="./app.js"></script>

</body>
</html>
